name: Northstar CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # Optional: install real API dependencies if available
          pip install stripe requests pyyaml 2>/dev/null || true

      - name: Run Northstar test suite
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run coverage check
        run: python -m pytest tests/ --cov=scripts --cov-report=term-missing --cov-fail-under=60

      - name: Run northstar demo (smoke test)
        run: |
          python scripts/northstar.py demo

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check scripts/ tests/ --ignore E501,W291
