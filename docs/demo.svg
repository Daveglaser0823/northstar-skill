<svg xmlns="http://www.w3.org/2000/svg" width="620" height="340" viewBox="0 0 620 340">
  <rect width="620" height="340" rx="10" fill="#1a1b26"/>
  <!-- Title bar -->
  <rect width="620" height="32" rx="10" fill="#24283b"/>
  <rect y="22" width="620" height="10" fill="#24283b"/>
  <circle cx="20" cy="16" r="6" fill="#f7768e"/>
  <circle cx="40" cy="16" r="6" fill="#e0af68"/>
  <circle cx="60" cy="16" r="6" fill="#9ece6a"/>
  <text x="310" y="20" text-anchor="middle" fill="#565f89" font-family="monospace" font-size="12">Terminal</text>
  <!-- Command -->
  <text x="20" y="60" fill="#7aa2f7" font-family="monospace" font-size="13">$</text>
  <text x="35" y="60" fill="#c0caf5" font-family="monospace" font-size="13">northstar demo</text>
  <!-- Output -->
  <text x="20" y="90" fill="#bb9af7" font-family="monospace" font-size="13">&#x1F4CA; Northstar Daily Briefing - March 25</text>
  <text x="20" y="115" fill="#9ece6a" font-family="monospace" font-size="13">Revenue yesterday: $1,248 (+12% vs last week)</text>
  <text x="20" y="137" fill="#c0caf5" font-family="monospace" font-size="13">Active subscribers: 342 (+3 new, -1 churn)</text>
  <text x="20" y="159" fill="#c0caf5" font-family="monospace" font-size="13">Month-to-date: $18,430 (74% of $24,900 goal)</text>
  <text x="20" y="185" fill="#c0caf5" font-family="monospace" font-size="13">Shopify: 23 fulfilled | 8 open | 1 refund ($47)</text>
  <text x="20" y="211" fill="#e0af68" font-family="monospace" font-size="13">&#x26A0;&#xFE0F; 2 payment retries pending - review in Stripe</text>
  <text x="20" y="237" fill="#73daca" font-family="monospace" font-size="13">Next: 6 days left in month, on track.</text>
  <!-- Prompt -->
  <text x="20" y="275" fill="#565f89" font-family="monospace" font-size="13">Ready to see your real numbers?</text>
  <text x="20" y="297" fill="#7aa2f7" font-family="monospace" font-size="13">$</text>
  <text x="35" y="297" fill="#c0caf5" font-family="monospace" font-size="13">northstar setup</text>
  <text x="178" y="297" fill="#565f89" font-family="monospace" font-size="13"># ~4 min interactive wizard</text>
</svg>